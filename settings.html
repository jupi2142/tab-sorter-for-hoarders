<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
    }
    .section {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 16px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #0055aa;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .help {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    .help a {
      color: #0066cc;
      text-decoration: none;
    }
    .help a:hover {
      text-decoration: underline;
    }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
    .status.testing {
      display: block;
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>
<body>
  <h2>Settings</h2>
  
  <div class="section">
    <label for="apiKey">Google AI API Key</label>
    <input type="text" id="apiKey" placeholder="Enter your API key">
    <div class="help">
      Get a free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
    </div>
  </div>

  <div class="section">
    <label for="chunkSize">Chunk Size</label>
    <input type="number" id="chunkSize" value="30" min="1" max="100">
    <div class="help">
      Number of tabs to process at once when sorting by similarity (default: 30)
    </div>
  </div>

  <div class="section">
    <button id="saveBtn">Save</button>
  </div>

  <div id="status" class="status"></div>

  <script src="settings.js"></script>
</body>
</html>
