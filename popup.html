<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .header h3 {
      margin: 0;
      font-size: 15px;
    }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      opacity: 0.6;
    }
    .settings-btn:hover {
      opacity: 1;
    }
    .section {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    select, input[type="range"] {
      width: 100%;
      margin-bottom: 4px;
    }
    .threshold-value {
      text-align: right;
      color: #666;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    button:hover {
      background: #0055aa;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .similarity-section {
      display: none;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .similarity-section.visible {
      display: block;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.loading {
      display: block;
      background: #fff3cd;
      color: #856404;
    }
    .status.done {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
    .api-warning {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .api-warning.visible {
      display: block;
    }
    .api-warning a {
      color: #0066cc;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Tab Sorter</h3>
    <button class="settings-btn" id="settingsBtn" title="Settings">&#9881;</button>
  </div>

  <div id="apiWarning" class="api-warning">
    API key required for similarity. <a href="#" id="setupLink">Set up</a>
  </div>

  <div class="section">
    <label>Sort Method</label>
    <select id="method">
      <option value="domain">Sort by domain</option>
      <option value="subdomain">Sort by subdomain</option>
      <option value="group">Group similar tabs</option>
      <option value="sort">Sort by similarity</option>
    </select>
  </div>

  <div id="similaritySection" class="similarity-section">
    <label>Similarity Threshold: <span id="thresholdValue">0.5</span></label>
    <input type="range" id="threshold" min="0" max="1" step="0.1" value="0.5">
  </div>

  <div class="section">
    <button id="runBtn">Sort</button>
  </div>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
